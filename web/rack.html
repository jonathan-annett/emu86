<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>emu86 rack — one tab, many machines</title>
    <!-- Inline-SVG favicon (the index.html trick): three rack units. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230c0c0c'/%3E%3Crect x='2' y='2' width='12' height='3' fill='%2333ff66'/%3E%3Crect x='2' y='6.5' width='12' height='3' fill='%2333ff66'/%3E%3Crect x='2' y='11' width='12' height='3' fill='%23207040'/%3E%3C/svg%3E"
    />
    <style>
      /* Self-contained (the tabshark pattern): the rack must not
         couple to the app stylesheet — each PC brings its own inside
         its iframe. */
      :root {
        --bg: #0c0c0c;
        --panel: #141414;
        --text: #d0d0d0;
        --dim: #7a7a7a;
        --accent: #33ff66;
        --frozen: #8ab4f8;
        --line: #2a2a2a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: 'Cascadia Code', 'Fira Code', Menlo, Consolas, monospace;
        font-size: 13px;
        display: flex;
        height: 100vh;
      }
      nav {
        width: 220px;
        min-width: 220px;
        background: var(--panel);
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
      }
      nav header {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      nav header h1 { font-size: 14px; margin: 0; color: var(--accent); }
      #add-pc {
        background: none;
        border: 1px solid var(--line);
        border-radius: 3px;
        color: var(--text);
        font: inherit;
        cursor: pointer;
        padding: 2px 9px;
      }
      #add-pc:hover { border-color: var(--accent); color: var(--accent); }
      #save-rack {
        background: none;
        border: 1px solid var(--line);
        border-radius: 3px;
        color: var(--text);
        font: inherit;
        cursor: pointer;
        padding: 2px 7px;
      }
      #save-rack:hover { border-color: var(--accent); }
      #rack-note {
        padding: 6px 12px;
        color: var(--frozen);
        border-bottom: 1px solid var(--line);
        font-size: 12px;
      }
      .pick-row .del {
        background: none;
        border: none;
        color: var(--dim);
        cursor: pointer;
        font: inherit;
      }
      .pick-row .del:hover { color: #cc4444; }
      #rail { flex: 1; overflow-y: auto; padding: 6px 0; }
      .pc-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        cursor: pointer;
        border-left: 3px solid transparent;
      }
      .pc-row:hover { background: #1c1c1c; }
      .pc-row.selected { background: #1f1f1f; border-left-color: var(--accent); }
      .pc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
      .pc-dot.running { background: var(--accent); }
      .pc-dot.frozen { background: var(--frozen); }
      .pc-dot.halted { background: #cc4444; }
      .pc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pc-sub { color: var(--dim); font-size: 11px; }
      #empty-hint {
        color: var(--dim);
        padding: 18px 12px;
        line-height: 1.5;
      }
      #pane { flex: 1; position: relative; }
      #pane iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      /* The picker */
      #picker-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
      }
      #picker-backdrop.open { display: flex; }
      #picker {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 4px;
        width: min(440px, 90vw);
        max-height: 70vh;
        overflow-y: auto;
        padding: 10px 0;
      }
      #picker h2 {
        font-size: 12px;
        margin: 0;
        padding: 4px 14px 10px;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .pick-row {
        padding: 8px 14px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .pick-row:hover { background: #1f1f1f; }
      .pick-row .age { color: var(--dim); white-space: nowrap; }
      .pick-none { color: var(--dim); padding: 8px 14px; }
    </style>
  </head>
  <body>
    <nav>
      <header>
        <h1>rack</h1>
        <span>
          <button id="save-rack" title="save the rack as a package">💾</button>
          <button id="add-pc" title="add a PC">+</button>
        </span>
      </header>
      <div id="rack-note" hidden></div>
      <div id="rail"></div>
    </nav>
    <main id="pane">
      <div id="empty-hint">
        No machines yet.<br /><br />
        [+] boots a new PC or loads a saved one. PCs running in their
        own tabs can be moved here with their “move to the rack”
        button.
      </div>
    </main>
    <div id="picker-backdrop">
      <div id="picker"></div>
    </div>
    <script type="module" src="./rack.ts"></script>
  </body>
</html>
